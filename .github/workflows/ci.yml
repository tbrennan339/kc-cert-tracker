name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install requests boto3 psycopg2-binary pandas python-dotenv fastapi uvicorn jinja2 sentry-sdk[fastapi] pytest
      - name: Run tests
        run: PYTHONPATH=. pytest tests/ -v